name: Deploy TMS FARMEX to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # Asegurar que el directorio existe
          mkdir -p /opt/gestion-de-viajes
          cd /opt/gestion-de-viajes
          
          # Inicializar git si no existe (primer despliegue)
          if [ ! -d ".git" ]; then
            git clone https://github.com/lalolima001-cloud/gestion-de-viajes.git .
          fi

          # Traer últimos cambios
          git fetch origin main
          git reset --hard origin/main
          
          # Validar existencia de .env antes de levantar
          if [ ! -f ".env" ]; then
            echo "AVISO: El archivo .env no existe. Creando uno vacío para no bloquear el despliegue."
            touch .env
          fi

          # Detener y rebuild sin cache para asegurar que los cambios se apliquen
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml build --no-cache tms-frontend
          docker compose -f docker-compose.prod.yml up -d

          # Limpieza
          docker image prune -f

          # Verificar que el servicio responde correctamente
          echo "Esperando que el servicio levante..."
          sleep 20
          MAX_RETRIES=5
          COUNT=0
          until curl -sf --max-time 10 http://localhost/ > /dev/null; do
            COUNT=$((COUNT+1))
            if [ $COUNT -ge $MAX_RETRIES ]; then
              echo "ERROR: El servicio no responde después de $MAX_RETRIES intentos. Despliegue fallido."
              docker compose -f docker-compose.prod.yml logs tms-frontend --tail=50
              exit 1
            fi
            echo "Intento $COUNT/$MAX_RETRIES fallido, reintentando en 10s..."
            sleep 10
          done
          echo "Despliegue exitoso: el servicio responde correctamente."
