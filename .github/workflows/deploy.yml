name: Deploy TMS FARMEX to VPS

# on:
#   push:
#     branches: [ "main" ]
on: workflow_dispatch # Permite dispararlo manualmente desde GitHub si se desea

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # Asegurar que el directorio existe
          mkdir -p /opt/gestion-de-viajes
          cd /opt/gestion-de-viajes
          
          # Inicializar git si no existe (primer despliegue)
          if [ ! -d ".git" ]; then
            git clone https://github.com/lalolima001-cloud/gestion-de-viajes.git .
          fi

          # Traer últimos cambios
          git fetch origin main
          git reset --hard origin/main
          
          # Validar existencia de .env antes de levantar
          if [ ! -f ".env" ]; then
            echo "ERROR: El archivo .env no existe en el servidor. El despliegue fallará."
            exit 1
          fi

          # Detener y rebuild
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d --build
          
          # Limpieza
          docker image prune -f
