name: Deploy TMS FARMEX to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # Asegurar que el directorio existe
          mkdir -p /opt/gestion-de-viajes
          cd /opt/gestion-de-viajes
          
          # Inicializar git si no existe (primer despliegue)
          if [ ! -d ".git" ]; then
            git clone https://github.com/lalolima001-cloud/gestion-de-viajes.git .
          fi

          # Traer últimos cambios
          git fetch origin main
          git reset --hard origin/main
          
          # Validar existencia de .env antes de levantar
          if [ ! -f ".env" ]; then
            echo "AVISO: El archivo .env no existe. Creando uno vacío para no bloquear el despliegue."
            touch .env
          fi

          # Detener y rebuild sin cache para asegurar que los cambios se apliquen
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml build --no-cache tms-frontend
          docker compose -f docker-compose.prod.yml up -d
          
          # Limpieza
          docker image prune -f
