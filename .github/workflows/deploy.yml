name: Deploy TMS FARMEX to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /opt/gestion-de-viajes
          # Traer últimos cambios de Github
          git pull origin main
          
          # Detener contenedores, recompilar frontend y levantar con la versión productiva
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d --build
          
          # Limpiar imágenes sobrantes para liberar espacio en disco
          docker image prune -f
